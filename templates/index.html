<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>

  <body>
    <header>
      <nav class="navbar navbar-expand navbar-dark bg-dark">
        <div class="container-fluid">
          <a class="navbar-brand" href="/">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="logo" width="40"/>
          </a>

          <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">

              <li class="nav-item">
                <a class="nav-link active" href="/">Home</a>
              </li>

              <li class="nav-item">
                <a class="nav-link" href="/message">Send message</a>
              </li>

              <li class="nav-item">
                <a class="nav-link" href="/read">Read messages</a>
              </li>

            </ul>
          </div>
        </div>
      </nav>

      <div class="p-3 pb-md-4 mx-auto text-center">
        <h1 class="display-4 fw-normal">Python</h1>
        <p class="fs-5 text-muted">
          Python can be easy to pick up whether you're a first time programmer
          or you're experienced with other languages.
        </p>
      </div>
    </header>

    <main class="container">
      <div class="row row-cols-1 row-cols-md-3 mb-3 text-center">

        <div class="col">
          <div class="card mb-4 rounded-3 shadow-sm">
            <div class="card-header py-3">
              <h4 class="my-0 fw-normal">Python Core</h4>
            </div>
            <div class="card-body">
              <h1 class="card-title mb-3">12 <small>weeks</small></h1>
            </div>
          </div>
        </div>

        <div class="col">
          <div class="card mb-4 rounded-3 shadow-sm border-primary">
            <div class="card-header py-3 text-bg-primary">
              <h4 class="my-0 fw-normal">Python Web</h4>
            </div>
            <div class="card-body">
              <h1 class="card-title mb-3">14 <small>weeks</small></h1>
            </div>
          </div>
        </div>

        <div class="col">
          <div class="card mb-4 rounded-3 shadow-sm">
            <div class="card-header py-3">
              <h4 class="my-0 fw-normal">Data Science</h4>
            </div>
            <div class="card-body">
              <h1 class="card-title mb-3">12 <small>weeks</small></h1>
            </div>
          </div>
        </div>

      </div>
    </main>
  </body>
</html>
