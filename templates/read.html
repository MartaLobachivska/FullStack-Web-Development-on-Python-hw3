<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messages</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>

  <body>
    <header>
      <nav class="navbar navbar-expand navbar-dark bg-dark">
        <div class="container-fluid">

          <a class="navbar-brand" href="/">
            <img src="{{ url_for('static', filename='logo.png') }}" width="40"/>
          </a>

          <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">

              <li class="nav-item">
                <a class="nav-link" href="/">Home</a>
              </li>

              <li class="nav-item">
                <a class="nav-link" href="/message">Send message</a>
              </li>

              <li class="nav-item">
                <a class="nav-link active" href="/read">Read messages</a>
              </li>

            </ul>
          </div>
        </div>
      </nav>
    </header>

    <div class="container mt-4">
      <h1 class="text-center mb-4">Messages</h1>

      {% if messages %}
        <div class="row">

          {% for time, msg in messages.items() %}
            <div class="col-md-6 mb-4">
              <div class="card shadow-sm h-100">

                <div class="card-body">
                  <h5 class="card-title">{{ msg.username }}</h5>
                  <p class="card-text">{{ msg.message }}</p>
                </div>

                <div class="card-footer text-muted">
                  {{ time }}
                </div>

              </div>
            </div>
          {% endfor %}

        </div>
      {% else %}
        <p class="text-center">No messages yet</p>
      {% endif %}

    </div>

  </body>
</html>
